<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Lives In Motion AI Receptionist</title>

<style>
body{
font-family:Arial,sans-serif;
margin:0;
background:#f7f9fb;
color:#333;
}

.hero{
background:linear-gradient(135deg,#0f4c81,#2f7fbf);
color:white;
padding:80px 20px;
text-align:center;
}

.hero h1{
font-size:3rem;
margin-bottom:10px;
}

.container{
max-width:1000px;
margin:auto;
padding:40px 20px;
}

.card{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 4px 15px rgba(0,0,0,.08);
}

#chat{
height:400px;
overflow-y:auto;
border:1px solid #ddd;
padding:15px;
margin-bottom:10px;
background:white;
}

input{
width:100%;
padding:12px;
margin-bottom:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
background:#0f4c81;
color:white;
border:none;
padding:12px 20px;
border-radius:6px;
cursor:pointer;
}

.msg{
margin-bottom:12px;
}

.user{
font-weight:bold;
}

.ai{
color:#0f4c81;
}
</style>
</head>

<body>

<section class="hero">
<h1>Lives In Motion AI Receptionist</h1>

<p>
24/7 intelligent enquiry support for care homes,
retirement communities and home care providers.
</p>
</section>

<div class="container">

<div class="card">

<h2>Live Demonstration</h2>

<div id="chat">
<div class="msg ai">
Hello. How can I help you today?
</div>
</div>

<input
id="message"
placeholder="Ask a question about care services..."
>

<button onclick="sendMessage()">
Send
</button>

</div>

</div>

<script>

let leadCaptured = false;

async function sendMessage(){

const input =
document.getElementById("message");

const chat =
document.getElementById("chat");

const text =
input.value.trim();

if(!text) return;

chat.innerHTML +=
`<div class="msg user">You: ${text}</div>`;

input.value="";

const response =
await fetch("/api/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
message:text
})
});

const data =
await response.json();

chat.innerHTML +=
`<div class="msg ai">AI: ${data.reply}</div>`;

chat.scrollTop =
chat.scrollHeight;

if(
!leadCaptured &&
(
text.toLowerCase().includes("price") ||
text.toLowerCase().includes("visit") ||
text.toLowerCase().includes("availability")
)
){

leadCaptured = true;

setTimeout(()=>{

chat.innerHTML += `
<div class="msg ai">
To help further, please provide:
<br><br>
Name<br>
Email<br>
Phone Number
</div>
`;

},1000);

}

}

</script>

</body>
</html>
